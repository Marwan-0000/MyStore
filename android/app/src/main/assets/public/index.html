<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني البسيط</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">🛒 متجر التميز</div>
        <div class="cart-icon" onclick="toggleCart()">
            السلة (<span id="cart-count">0</span>)
        </div>
    </header>

    <main>
        <h1>منتجاتنا المميزة</h1>
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>سلة المشتريات</h3>
            <span class="close-btn" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cart-items">
            <p style="text-align: center; color: #888;">السلة فارغة حالياً</p>
        </div>
        <div class="cart-footer">
            <div class="total">الإجمالي: <span id="cart-total">0</span> ريال</div>
            <button class="checkout-btn" onclick="checkout()">إتمام الشراء</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
